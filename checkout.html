<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Checkout | Biserry Groceries</title><link rel="stylesheet" href="../css/styles.css"><script src="https://js.paystack.co/v1/inline.js"></script></head><body><header class="site-header"><div class="brand"><div class="logo">BG</div><div><h1>Checkout</h1><p>Delivery or pickup available</p></div></div><nav class="nav"><a href="shop.html">Shop</a><a href="cart.html">Cart</a></nav></header><section class="section"><div class="panel"><h2>Customer Details</h2><form id="checkoutForm"><div class="form-grid"><input id="name" required placeholder="Full Name"><input id="phone" required placeholder="Phone Number"></div><input id="email" type="email" placeholder="Email for online card payment"><textarea id="address" required placeholder="Delivery address or pickup note"></textarea><div class="form-grid"><select id="fulfillment"><option value="Delivery">Delivery</option><option value="Pickup">Pickup</option></select><select id="paymentMethod"><option value="Bank Transfer">Bank Transfer</option><option value="Card Payment">Card Payment</option><option value="USSD">USSD</option><option value="Cash on Delivery">Cash on Delivery</option><option value="Mobile Money">Mobile Money</option></select></div><button class="btn" type="submit">Submit Order & Send WhatsApp</button><button class="btn gold" type="button" id="payBtn">Pay Online with Paystack</button></form></div></section><script type="module" src="../js/checkout.js"></script></body></html>
