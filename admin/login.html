<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Biserry Groceries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <main class="loginPage">
    <section class="loginCard">
      <img src="../assets/logo.png" alt="Biserry Groceries">
      <h1>Admin Login</h1>
      <p>Sign in to manage Biserry Groceries OS.</p>

      <form id="loginForm">
        <input id="email" type="email" required placeholder="Admin Email">
        <input id="password" type="password" required placeholder="Password">
        <button class="btn" type="submit">Login</button>
      </form>

      <p><a href="../index.html">Back to Store</a></p>
    </section>
  </main>

  <script type="module" src="../js/admin-auth.js"></script>
</body>
</html>
