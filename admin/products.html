<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Products & Inventory</title><link rel="stylesheet" href="../css/styles.css"><link rel="stylesheet" href="../css/admin.css"></head><body><div class="admin-shell"><aside class="sidebar"><h2>Biserry OS</h2><a href="dashboard.html">Dashboard</a><a href="products.html">Products & Inventory</a><a href="orders.html">Orders & Delivery</a><a href="customers.html">Customers</a><a href="reports.html">Reports</a><a href="../index.html">View Store</a><button id="logoutBtn" class="btn gold" style="margin-top:20px">Logout</button></aside><main class="admin-main"><div class="admin-top"><h1>Products & Inventory</h1></div><div class="panel"><h2>Add Product</h2><form id="productForm"><div class="form-grid"><input id="name" required placeholder="Product Name"><select id="category"><option value="grains">Grains</option><option value="oil">Oil</option><option value="spices">Spices</option><option value="drinks">Drinks</option><option value="household">Household</option><option value="fresh">Fresh Produce</option></select></div><div class="form-grid"><input id="price" type="number" required placeholder="Price"><input id="stock" type="number" required placeholder="Stock Quantity"></div><div class="form-grid"><input id="lowStockThreshold" type="number" placeholder="Low Stock Alert e.g. 5"><input id="image" type="file" accept="image/*"></div><button class="btn" type="submit">Save Product</button></form></div><div class="panel"><h2>Product List</h2><table class="table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead><tbody id="productsTable"></tbody></table></div></main></div><script type="module" src="../js/admin-auth.js"></script><script type="module" src="../js/admin-products.js"></script></body></html>
